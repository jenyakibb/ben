<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация — BoroRobotics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ГЛОБАЛЬНЫЙ СБРОС */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ФОН — ТАКАЯ ЖЕ СЕТКА КАК НА ГЛАВНОЙ */
        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* НЕОНОВЫЕ СФЕРЫ */
        .glow-orbs {
            position: fixed;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(80px);
            animation: pulseGlow 6s ease-in-out infinite alternate;
        }

        .glow-orbs.bottom {
            top: auto;
            bottom: -20%;
            right: auto;
            left: -10%;
            background: radial-gradient(circle, rgba(255, 0, 200, 0.1) 0%, transparent 70%);
            animation-delay: 3s;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        /* КАРТОЧКА ВХОДА */
        .auth-card {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 32px;
            padding: 48px 40px 40px;
            box-shadow: 0 0 80px rgba(0, 255, 255, 0.05), inset 0 0 80px rgba(0, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: conic-gradient(from 0deg, transparent, rgba(0, 255, 255, 0.2), transparent, rgba(255, 0, 200, 0.2), transparent);
            border-radius: 32px;
            z-index: -1;
            animation: spinBorder 10s linear infinite;
        }

        @keyframes spinBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ЛОГОТИП НА КАРТОЧКЕ */
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo .logo-icon {
            display: inline-block;
            width: 56px;
            height: 56px;
            border: 2px solid #00ffff;
            border-radius: 14px;
            background: rgba(0, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            text-align: center;
            line-height: 56px;
            font-size: 32px;
            color: #00ffff;
            transform: rotate(10deg);
            margin-bottom: 12px;
        }

        .auth-logo h2 {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 0%, #a0f0ff 50%, #00ffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-logo .subtitle {
            color: #5a627a;
            font-size: 14px;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ТАБЫ ПЕРЕКЛЮЧЕНИЯ */
        .tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #5a627a;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .tab-btn.active {
            background: rgba(0, 255, 255, 0.12);
            color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.05);
        }

        .tab-btn:hover:not(.active) {
            color: #b0b8c8;
        }

        /* ФОРМЫ */
        .form-container {
            display: block;
        }

        .form-container.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5a627a;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: rgba(0, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.05);
        }

        .form-group input::placeholder {
            color: #3a3f50;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 28px;
            font-size: 14px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #7a829a;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 4px;
            cursor: pointer;
        }

        .form-options a {
            color: #00ffff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .form-options a:hover {
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        /* КНОПКА ОТПРАВКИ */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00ccff, #0088ff);
            border: none;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #0a0a0f;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 60px rgba(0, 200, 255, 0.5);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* РАЗДЕЛИТЕЛЬ */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0 20px;
            color: #3a3f50;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
        }

        /* СОЦИАЛЬНЫЕ КНОПКИ */
        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: #7a829a;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #e0e0e0;
        }

        /* НАВИГАЦИЯ НА ГЛАВНУЮ */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #5a627a;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-top: 24px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #00ffff;
        }

        /* АДАПТИВ */
        @media (max-width: 500px) {
            .auth-card {
                padding: 32px 20px 28px;
            }

            .auth-logo h2 {
                font-size: 20px;
            }

            .tab-btn {
                font-size: 13px;
                padding: 10px 8px;
            }

            .form-options {
                flex-direction: column;
                align-items: start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ФОН -->
    <div class="grid-background"></div>
    <div class="glow-orbs"></div>
    <div class="glow-orbs bottom"></div>

    <!-- ОСНОВНОЙ КОНТЕЙНЕР -->
    <div class="container">

        <div class="auth-card">

            <!-- ЛОГОТИП -->
            <div class="auth-logo">
                <div class="logo-icon">⚡</div>
                <h2>BORO Robotics</h2>
                <div class="subtitle">🔐 Доступ к личному кабинету</div>
            </div>

            <!-- ТАБЫ -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">Вход</button>
                <button class="tab-btn" data-tab="register" onclick="switchTab('register')">Регистрация</button>
            </div>

            <!-- ФОРМА ВХОДА -->
            <div id="loginForm" class="form-container">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>📧 Email</label>
                        <input type="email" placeholder="robot@borovichi.ru" required>
                    </div>
                    <div class="form-group">
                        <label>🔒 Пароль</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-options">
                        <label>
                            <input type="checkbox" checked> Запомнить меня
                        </label>
                        <a href="#">Забыли пароль?</a>
                    </div>
                    <button type="submit" class="btn-submit">🚀 Войти</button>
                </form>
            </div>

            <!-- ФОРМА РЕГИСТРАЦИИ -->
            <div id="registerForm" class="form-container hidden">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>👤 Имя</label>
                        <input type="text" placeholder="Иван Петров" required>
                    </div>
                    <div class="form-group">
                        <label>📧 Email</label>
                        <input type="email" placeholder="ivan@borovichi.ru" required>
                    </div>
                    <div class="form-group">
                        <label>🔒 Пароль</label>
                        <input type="password" placeholder="Минимум 6 символов" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label>🔐 Подтверждение</label>
                        <input type="password" placeholder="Повторите пароль" minlength="6" required>
                    </div>
                    <div class="form-options">
                        <label>
                            <input type="checkbox" required> Я согласен с <a href="#" style="color:#00ffff;">условиями</a>
                        </label>
                    </div>
                    <button type="submit" class="btn-submit">✨ Создать аккаунт</button>
                </form>
            </div>

            <!-- РАЗДЕЛИТЕЛЬ -->
            <div class="divider">или войдите через</div>

            <!-- СОЦИАЛЬНЫЕ СЕТИ -->
            <div class="social-login">
                <button class="social-btn">🌐 Google</button>
                <button class="social-btn">🐦 X</button>
                <button class="social-btn">📱 GitHub</button>
            </div>

            <!-- ССЫЛКА НА ГЛАВНУЮ -->
            <a href="index.html" class="back-link">
                ← Вернуться на главную
            </a>

        </div>

    </div>

    <script>
        // ПЕРЕКЛЮЧЕНИЕ МЕЖДУ ВХОДОМ И РЕГИСТРАЦИЕЙ
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');

            tabs.forEach(btn => btn.classList.remove('active'));

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                document.querySelector('.tab-btn[data-tab="login"]').classList.add('active');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                document.querySelector('.tab-btn[data-tab="register"]').classList.add('active');
            }
        }

        // ОБРАБОТЧИКИ ФОРМ (демо-режим)
        function handleLogin(e) {
            e.preventDefault();
            alert('🔐 Добро пожаловать в BoroRobotics!\n(Вход выполнен, но это демо-версия)');
            // Здесь можно перенаправить в личный кабинет
            // window.location.href = 'dashboard.html';
        }

        function handleRegister(e) {
            e.preventDefault();
            alert('✨ Аккаунт создан!\nПроверьте почту для подтверждения.\n(Демо-режим)');
            // Здесь можно переключиться на вход
            switchTab('login');
        }

        // Обработка Enter на полях (автоматически)
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const form = this.closest('form');
                    if (form) form.dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>

</body>
</html>
